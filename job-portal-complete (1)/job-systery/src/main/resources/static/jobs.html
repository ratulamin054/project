<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs | Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; display: flex; }

    .sidebar {
      width: 240px; min-height: 100vh; background: rgba(15,23,42,0.95);
      border-right: 1px solid rgba(99,102,241,0.2); padding: 28px 18px;
      position: fixed; top: 0; left: 0; display: flex; flex-direction: column;
    }
    .sidebar .brand { color: #818cf8; font-size: 1.35rem; font-weight: 800; margin-bottom: 36px; display: flex; align-items: center; gap: 10px; }
    .sidebar a {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      color: #94a3b8; text-decoration: none; border-radius: 10px; font-size: 0.92rem;
      font-weight: 500; margin-bottom: 4px; transition: all .2s;
    }
    .sidebar a:hover, .sidebar a.active { background: rgba(99,102,241,0.18); color: #e2e8f0; }
    .sidebar a i { width: 18px; }
    .sidebar .logout-btn {
      margin-top: auto; display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: rgba(239,68,68,0.15); color: #f87171;
      border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; width: 100%; transition: all .2s;
    }
    .sidebar .logout-btn:hover { background: rgba(239,68,68,0.3); }

    .main { margin-left: 240px; padding: 36px; flex: 1; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(30,41,59,0.8); border: 1px solid rgba(99,102,241,0.15);
      border-radius: 14px; padding: 18px 24px; margin-bottom: 28px;
    }
    .topbar h4 { color: #e2e8f0; font-weight: 800; margin: 0; }
    .topbar .user-chip {
      display: flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3); border-radius: 20px; padding: 6px 14px; color: #a5b4fc; font-size: 0.85rem;
    }

    .search-bar {
      background: rgba(30,41,59,0.8); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 14px; padding: 20px 24px; margin-bottom: 24px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
    }
    .search-bar .form-control, .search-bar .form-select {
      background: rgba(15,23,42,0.7) !important; border: 1px solid rgba(99,102,241,0.25) !important;
      color: #e2e8f0 !important; border-radius: 10px !important;
    }
    .search-bar .form-control::placeholder { color: #475569 !important; }
    .btn-search {
      background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white;
      border: none; border-radius: 10px; padding: 10px 24px; font-weight: 700; cursor: pointer;
    }
    .btn-clear { background: rgba(100,116,139,0.3); color: #94a3b8; border: 1px solid rgba(100,116,139,0.4); border-radius: 10px; padding: 10px 18px; cursor: pointer; font-weight: 600; }

    .results-info { color: #64748b; font-size: 0.88rem; margin-bottom: 16px; }
    .results-info span { color: #818cf8; font-weight: 700; }

    .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

    .job-card {
      background: rgba(30,41,59,0.8); border: 1px solid rgba(99,102,241,0.15);
      border-radius: 16px; padding: 22px; cursor: pointer; transition: all .25s;
      display: flex; flex-direction: column; gap: 12px;
    }
    .job-card:hover { border-color: rgba(99,102,241,0.5); transform: translateY(-2px); box-shadow: 0 12px 35px rgba(0,0,0,0.3); }
    .job-card .company-logo {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6); display: flex;
      align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.1rem;
    }
    .job-card .top-row { display: flex; align-items: center; gap: 12px; }
    .job-card .job-title { color: #e2e8f0; font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .job-card .company-name { color: #94a3b8; font-size: 0.85rem; margin-top: 2px; }
    .job-card .meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(99,102,241,0.12); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25); border-radius: 20px;
      padding: 3px 10px; font-size: 0.78rem; font-weight: 500;
    }
    .badge-pill.green { background: rgba(34,197,94,0.12); color: #4ade80; border-color: rgba(34,197,94,0.25); }
    .badge-pill.orange { background: rgba(251,146,60,0.12); color: #fb923c; border-color: rgba(251,146,60,0.25); }
    .job-desc { color: #64748b; font-size: 0.83rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-apply {
      background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white;
      border: none; border-radius: 10px; padding: 10px; font-weight: 700;
      cursor: pointer; transition: all .2s; font-size: 0.9rem;
    }
    .btn-apply:hover { box-shadow: 0 5px 18px rgba(99,102,241,0.4); transform: translateY(-1px); }
    .btn-apply:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .empty-state {
      text-align: center; padding: 80px 20px; color: #64748b;
    }
    .empty-state i { font-size: 3rem; color: #334155; margin-bottom: 16px; }
    .empty-state h5 { color: #94a3b8; margin-bottom: 8px; }

    .spinner-wrap { text-align: center; padding: 60px; color: #818cf8; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #1e293b; border: 1px solid rgba(99,102,241,0.3);
      border-radius: 18px; padding: 32px; width: 540px; max-width: 95vw;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .modal-box h4 { color: #e2e8f0; font-weight: 800; margin-bottom: 8px; }
    .modal-box .modal-company { color: #818cf8; font-size: 0.95rem; margin-bottom: 18px; }
    .modal-box .section-label { color: #64748b; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px; }
    .modal-box .section-body { color: #94a3b8; font-size: 0.9rem; line-height: 1.7; white-space: pre-wrap; }
    .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #64748b; font-size: 1.4rem; cursor: pointer; }
    .modal-footer { margin-top: 24px; display: flex; gap: 10px; }
    .btn-confirm { flex: 1; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; border: none; border-radius: 10px; padding: 13px; font-weight: 700; cursor: pointer; }
    .btn-cancel { flex: 1; background: rgba(100,116,139,0.2); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); border-radius: 10px; padding: 13px; font-weight: 700; cursor: pointer; }

    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4);
      color: #4ade80; padding: 14px 22px; border-radius: 12px; font-weight: 600;
      font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
      transform: translateY(80px); transition: transform .3s; box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }
    .toast.show { transform: translateY(0); }
    .toast.error { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #f87171; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand"><i class="fas fa-briefcase"></i> Job Portal</div>
  <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
  <a href="jobs.html" class="active"><i class="fas fa-search"></i> Browse Jobs</a>
  <a href="dashboard.html#applications"><i class="fas fa-file-alt"></i> My Applications</a>
  <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <h4><i class="fas fa-search" style="color:#818cf8;margin-right:10px;"></i>Browse Jobs</h4>
    <div class="user-chip"><i class="fas fa-user-circle"></i><span id="userName">Loading...</span></div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <div style="flex:2;min-width:200px;">
      <label style="color:#94a3b8;font-size:0.8rem;font-weight:600;margin-bottom:6px;display:block;">Search</label>
      <input type="text" id="searchKeyword" class="form-control" placeholder="Job title, company, skills...">
    </div>
    <div style="flex:1;min-width:150px;">
      <label style="color:#94a3b8;font-size:0.8rem;font-weight:600;margin-bottom:6px;display:block;">Type</label>
      <select id="filterType" class="form-select">
        <option value="">All Types</option>
        <option>Full-time</option><option>Part-time</option>
        <option>Contract</option><option>Internship</option><option>Remote</option>
      </select>
    </div>
    <div>
      <label style="color:#94a3b8;font-size:0.8rem;font-weight:600;margin-bottom:6px;display:block;">&nbsp;</label>
      <div style="display:flex;gap:8px;">
        <button class="btn-search" onclick="filterJobs()"><i class="fas fa-search"></i> Search</button>
        <button class="btn-clear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <div id="jobGrid" class="job-grid">
    <div class="spinner-wrap"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:12px;">Loading jobs...</p></div>
  </div>
</div>

<!-- JOB DETAIL / APPLY MODAL -->
<div class="modal-overlay" id="applyModal">
  <div class="modal-box" style="position:relative;">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h4 id="modalTitle"></h4>
    <div class="modal-company" id="modalCompany"></div>
    <div class="meta" id="modalMeta" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;"></div>
    <div class="section-label">Description</div>
    <div class="section-body" id="modalDesc"></div>
    <div class="modal-footer">
      <button class="btn-confirm" id="applyBtn" onclick="confirmApply()">
        <i class="fas fa-paper-plane" style="margin-right:6px;"></i>Apply Now
      </button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) window.location.href = "login.html";
  document.getElementById("userName").textContent = user.name;

  let allJobs = [];
  let selectedJob = null;

  function loadJobs() {
    fetch("http://localhost:8080/jobs/all")
      .then(r => r.json())
      .then(data => {
        allJobs = data.filter(j => j.status === "ACTIVE");
        renderJobs(allJobs);
      })
      .catch(() => {
        document.getElementById("jobGrid").innerHTML =
          `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h5>Cannot connect to server</h5><p>Make sure the backend is running on port 8080.</p></div>`;
      });
  }

  function renderJobs(jobs) {
    const grid = document.getElementById("jobGrid");
    document.getElementById("resultsInfo").innerHTML = `Showing <span>${jobs.length}</span> job${jobs.length!==1?'s':''}`;
    if (!jobs.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-search"></i><h5>No jobs found</h5><p>Try different search terms or clear the filter.</p></div>`;
      return;
    }
    grid.innerHTML = jobs.map(j => `
      <div class="job-card" onclick="openModal(${j.id})">
        <div class="top-row">
          <div class="company-logo">${(j.companyName||"?")[0].toUpperCase()}</div>
          <div>
            <div class="job-title">${j.title}</div>
            <div class="company-name"><i class="fas fa-building" style="margin-right:4px;opacity:.6;"></i>${j.companyName}</div>
          </div>
        </div>
        <div class="meta">
          ${j.type ? `<span class="badge-pill"><i class="fas fa-briefcase"></i>${j.type}</span>` : ""}
          ${j.location ? `<span class="badge-pill green"><i class="fas fa-map-marker-alt"></i>${j.location}</span>` : ""}
          ${j.salary ? `<span class="badge-pill orange"><i class="fas fa-money-bill"></i>${j.salary}</span>` : ""}
        </div>
        <div class="job-desc">${j.description||""}</div>
        <button class="btn-apply" onclick="event.stopPropagation();openModal(${j.id})">
          <i class="fas fa-paper-plane" style="margin-right:6px;"></i>View & Apply
        </button>
      </div>
    `).join("");
  }

  function openModal(id) {
    selectedJob = allJobs.find(j => j.id === id);
    if (!selectedJob) return;
    document.getElementById("modalTitle").textContent = selectedJob.title;
    document.getElementById("modalCompany").innerHTML = `<i class="fas fa-building" style="margin-right:6px;"></i>${selectedJob.companyName}`;
    document.getElementById("modalMeta").innerHTML = [
      selectedJob.type && `<span class="badge-pill"><i class="fas fa-briefcase"></i>${selectedJob.type}</span>`,
      selectedJob.location && `<span class="badge-pill green"><i class="fas fa-map-marker-alt"></i>${selectedJob.location}</span>`,
      selectedJob.salary && `<span class="badge-pill orange"><i class="fas fa-money-bill"></i>${selectedJob.salary}</span>`,
    ].filter(Boolean).join("");
    document.getElementById("modalDesc").textContent = selectedJob.description || "No description provided.";
    document.getElementById("applyModal").classList.add("show");
  }

  function closeModal() {
    document.getElementById("applyModal").classList.remove("show");
    selectedJob = null;
  }

  function confirmApply() {
    if (!selectedJob) return;
    const btn = document.getElementById("applyBtn");
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Applying...';

    fetch("http://localhost:8080/application/apply", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        userName: user.name,
        userEmail: user.email,
        jobTitle: selectedJob.title,
        companyName: selectedJob.companyName,
        status: "PENDING"
      })
    })
    .then(r => r.json())
    .then(() => {
      showToast("✅ Application submitted successfully!", "success");
      closeModal();
    })
    .catch(() => showToast("❌ Failed to apply. Try again.", "error"))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:6px;"></i>Apply Now';
    });
  }

  function filterJobs() {
    const kw = document.getElementById("searchKeyword").value.toLowerCase().trim();
    const tp = document.getElementById("filterType").value;
    const filtered = allJobs.filter(j => {
      const matchKw = !kw || (j.title||"").toLowerCase().includes(kw)
        || (j.companyName||"").toLowerCase().includes(kw)
        || (j.description||"").toLowerCase().includes(kw)
        || (j.location||"").toLowerCase().includes(kw);
      const matchTp = !tp || j.type === tp;
      return matchKw && matchTp;
    });
    renderJobs(filtered);
  }

  function clearSearch() {
    document.getElementById("searchKeyword").value = "";
    document.getElementById("filterType").value = "";
    renderJobs(allJobs);
  }

  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.className = `toast${type==="error"?" error":""}`;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  document.getElementById("searchKeyword").addEventListener("keydown", e => { if (e.key === "Enter") filterJobs(); });
  loadJobs();
</script>
</body>
</html>
