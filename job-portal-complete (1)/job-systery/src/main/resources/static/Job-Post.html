<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job | Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; display: flex; }

    .sidebar {
      width: 240px; min-height: 100vh; background: rgba(15,23,42,0.95);
      border-right: 1px solid rgba(99,102,241,0.2); padding: 28px 18px;
      position: fixed; top: 0; left: 0; display: flex; flex-direction: column;
    }
    .sidebar .brand { color: #818cf8; font-size: 1.35rem; font-weight: 800; margin-bottom: 36px; display: flex; align-items: center; gap: 10px; }
    .sidebar a {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      color: #94a3b8; text-decoration: none; border-radius: 10px; font-size: 0.92rem;
      font-weight: 500; margin-bottom: 4px; transition: all .2s;
    }
    .sidebar a:hover, .sidebar a.active { background: rgba(99,102,241,0.18); color: #e2e8f0; }
    .sidebar a i { width: 18px; }
    .sidebar .logout-btn {
      margin-top: auto; display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: rgba(239,68,68,0.15); color: #f87171;
      border: none; border-radius: 10px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; width: 100%; transition: all .2s;
    }
    .sidebar .logout-btn:hover { background: rgba(239,68,68,0.3); }

    .main { margin-left: 240px; padding: 36px; flex: 1; }

    .page-header { margin-bottom: 32px; }
    .page-header h2 { color: #e2e8f0; font-size: 1.7rem; font-weight: 800; }
    .page-header p { color: #94a3b8; margin-top: 4px; }

    .form-card {
      background: rgba(30,41,59,0.8); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 18px; padding: 36px; max-width: 780px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .form-section { margin-bottom: 28px; }
    .form-section-title {
      color: #818cf8; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(99,102,241,0.2);
    }
    label { color: #cbd5e1; font-size: 0.88rem; font-weight: 600; margin-bottom: 6px; display: block; }
    .form-control, .form-select {
      background: rgba(15,23,42,0.7) !important; border: 1px solid rgba(99,102,241,0.25) !important;
      color: #e2e8f0 !important; border-radius: 10px !important; padding: 11px 15px !important;
      font-size: 0.92rem !important; transition: all .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important;
      outline: none;
    }
    .form-control::placeholder { color: #475569 !important; }
    textarea.form-control { resize: vertical; min-height: 120px; }

    .char-count { color: #64748b; font-size: 0.78rem; text-align: right; margin-top: 4px; }

    .tag-input-wrap { position: relative; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      background: rgba(99,102,241,0.25); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.4);
      border-radius: 20px; padding: 3px 12px; font-size: 0.82rem; display: flex;
      align-items: center; gap: 5px;
    }
    .tag button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.75rem; padding: 0; line-height: 1; }

    .btn-post {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
      border: none; border-radius: 12px; padding: 14px 40px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: all .2s; width: 100%;
    }
    .btn-post:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .btn-post:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    .alert-box {
      padding: 14px 18px; border-radius: 10px; margin-bottom: 20px;
      font-weight: 600; display: none; align-items: center; gap: 10px;
    }
    .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .alert-error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }

    .preview-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(99,102,241,0.15); color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3); border-radius: 8px;
      padding: 4px 10px; font-size: 0.8rem; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand"><i class="fas fa-briefcase"></i> Job Portal</div>
  <a href="company-dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <a href="Job-Post.html" class="active"><i class="fas fa-plus-circle"></i> Post a Job</a>
  <a href="company-dashboard.html#jobs"><i class="fas fa-list"></i> My Jobs</a>
  <a href="company-dashboard.html#applications"><i class="fas fa-users"></i> Applications</a>
  <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="page-header">
    <h2><i class="fas fa-plus-circle" style="color:#818cf8;margin-right:10px;"></i>Post a New Job</h2>
    <p>Fill in the details below to attract the right candidates.</p>
  </div>

  <div class="form-card">
    <div id="alertBox" class="alert-box"></div>

    <!-- BASIC INFO -->
    <div class="form-section">
      <div class="form-section-title"><i class="fas fa-info-circle"></i> Basic Information</div>
      <div class="row g-3">
        <div class="col-md-8">
          <label>Job Title *</label>
          <input type="text" id="title" class="form-control" placeholder="e.g. Senior React Developer">
        </div>
        <div class="col-md-4">
          <label>Job Type *</label>
          <select id="type" class="form-select">
            <option value="">Select type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Internship</option>
            <option>Remote</option>
          </select>
        </div>
        <div class="col-md-6">
          <label>Location *</label>
          <input type="text" id="location" class="form-control" placeholder="e.g. Dhaka, Bangladesh">
        </div>
        <div class="col-md-6">
          <label>Salary / Range</label>
          <input type="text" id="salary" class="form-control" placeholder="e.g. 50,000 – 70,000 BDT">
        </div>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-section">
      <div class="form-section-title"><i class="fas fa-align-left"></i> Job Description</div>
      <label>Description *</label>
      <textarea id="description" class="form-control" placeholder="Describe the role, responsibilities, and what a typical day looks like..." oninput="updateCount(this,'descCount')"></textarea>
      <div class="char-count"><span id="descCount">0</span> / 2000 characters</div>
    </div>

    <!-- REQUIREMENTS -->
    <div class="form-section">
      <div class="form-section-title"><i class="fas fa-check-circle"></i> Requirements & Skills</div>
      <label>Requirements</label>
      <textarea id="requirements" class="form-control" placeholder="List the experience, qualifications, or certifications required..."></textarea>

      <label class="mt-3">Required Skills <span style="color:#64748b;font-weight:400;">(press Enter or comma to add)</span></label>
      <input type="text" id="skillInput" class="form-control" placeholder="e.g. Java, Spring Boot, React..." onkeydown="addSkillTag(event)">
      <div id="skillTags" class="tag-list"></div>
    </div>

    <!-- DEADLINE -->
    <div class="form-section">
      <div class="form-section-title"><i class="fas fa-calendar"></i> Additional Details</div>
      <div class="row g-3">
        <div class="col-md-6">
          <label>Application Deadline</label>
          <input type="date" id="deadline" class="form-control">
        </div>
        <div class="col-md-6">
          <label>Number of Vacancies</label>
          <input type="number" id="vacancies" class="form-control" placeholder="e.g. 3" min="1">
        </div>
      </div>
    </div>

    <button class="btn-post" id="postBtn" onclick="postJob()">
      <i class="fas fa-paper-plane" style="margin-right:8px;"></i>Post Job
    </button>
  </div>
</div>

<script>
  // Auth guard
  const company = JSON.parse(localStorage.getItem("company"));
  if (!company) window.location.href = "company-login.html";

  function updateCount(el, id) {
    document.getElementById(id).textContent = el.value.length;
  }

  // Skills tag system
  let skills = [];
  function addSkillTag(e) {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const val = e.target.value.replace(",", "").trim();
      if (val && !skills.includes(val)) {
        skills.push(val);
        renderTags();
      }
      e.target.value = "";
    }
  }
  function removeTag(skill) {
    skills = skills.filter(s => s !== skill);
    renderTags();
  }
  function renderTags() {
    document.getElementById("skillTags").innerHTML = skills.map(s =>
      `<span class="tag">${s}<button onclick="removeTag('${s}')">&times;</button></span>`
    ).join("");
  }

  function showAlert(msg, type) {
    const box = document.getElementById("alertBox");
    box.className = `alert-box alert-${type}`;
    box.style.display = "flex";
    box.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> ${msg}`;
    if (type === "success") setTimeout(() => { box.style.display = "none"; }, 4000);
  }

  function postJob() {
    const title = document.getElementById("title").value.trim();
    const type  = document.getElementById("type").value;
    const loc   = document.getElementById("location").value.trim();
    const desc  = document.getElementById("description").value.trim();

    if (!title || !type || !loc || !desc) {
      showAlert("Please fill all required fields (marked with *).", "error");
      return;
    }

    const btn = document.getElementById("postBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Posting...';

    const body = {
      title,
      type,
      location:    loc,
      salary:      document.getElementById("salary").value.trim(),
      description: desc + (document.getElementById("requirements").value.trim()
                     ? "\n\n**Requirements:**\n" + document.getElementById("requirements").value.trim() : "")
                   + (skills.length ? "\n\n**Skills:** " + skills.join(", ") : ""),
      companyName: company.name,
      status: "ACTIVE"
    };

    fetch("http://localhost:8080/jobs/post", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    .then(r => r.json())
    .then(data => {
      showAlert(`✅ Job "${data.title}" posted successfully!`, "success");
      // Reset form
      ["title","type","location","salary","description","requirements","skillInput","deadline","vacancies"]
        .forEach(id => document.getElementById(id).value = "");
      skills = []; renderTags();
      document.getElementById("descCount").textContent = "0";
    })
    .catch(() => showAlert("Server error. Make sure the backend is running on port 8080.", "error"))
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:8px;"></i>Post Job';
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = "company-login.html";
  }

  // Set min date for deadline to today
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("deadline").min = today;
</script>
</body>
</html>
