<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Login | Job Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(135deg,#0f172a 0%,#14193a 50%,#0f172a 100%);min-height:100vh;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;}
    .container{width:100%;max-width:420px;padding:20px;}
    .brand{text-align:center;margin-bottom:28px;}
    .brand .icon{width:60px;height:60px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .brand .icon i{color:white;font-size:1.5rem;}
    .brand h1{color:#e2e8f0;font-size:1.5rem;font-weight:800;}
    .brand p{color:#64748b;font-size:.88rem;margin-top:4px;}
    .card{background:rgba(30,41,59,.85);border:1px solid rgba(14,165,233,.2);border-radius:20px;padding:36px;backdrop-filter:blur(10px);box-shadow:0 25px 60px rgba(0,0,0,.4);}
    .demo-box{background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:10px;padding:12px 14px;margin-bottom:22px;}
    .demo-box p{color:#64748b;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
    .demo-box .cred{color:#94a3b8;font-size:.82rem;margin-bottom:2px;}
    .demo-box .cred span{color:#38bdf8;font-weight:600;}
    label{color:#94a3b8;font-size:.83rem;font-weight:600;display:block;margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:16px;}
    .input-wrap i.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:.88rem;}
    input{width:100%;background:rgba(15,23,42,.7);border:1px solid rgba(14,165,233,.2);color:#e2e8f0;border-radius:10px;padding:12px 14px 12px 40px;font-size:.92rem;outline:none;transition:all .2s;}
    input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(14,165,233,.15);}
    input::placeholder{color:#334155;}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;}
    .btn-submit{width:100%;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(14,165,233,.4);}
    .btn-submit:disabled{opacity:.6;transform:none;cursor:not-allowed;}
    .msg{font-size:.85rem;font-weight:600;text-align:center;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
    .msg.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;}
    .msg.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#334155;font-size:.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(14,165,233,.15);}
    .link-row{text-align:center;color:#64748b;font-size:.85rem;margin-top:12px;}
    .link-row a{color:#38bdf8;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="icon"><i class="fas fa-building"></i></div>
    <h1>Company Portal</h1>
    <p>Manage your jobs and candidates</p>
  </div>
  <div class="card">
    <div class="demo-box">
      <p>Demo Credentials</p>
      <div class="cred">Email: <span>techcorp@example.com</span></div>
      <div class="cred">Password: <span>company123</span></div>
    </div>
    <label>Company Email</label>
    <div class="input-wrap"><i class="icon fas fa-envelope"></i><input type="email" id="email" placeholder="company@example.com"></div>
    <label>Password</label>
    <div class="input-wrap">
      <i class="icon fas fa-lock"></i>
      <input type="password" id="password" placeholder="Your password">
      <button class="eye-btn" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Login
    </button>
    <div class="msg" id="msg"></div>
    <div class="divider">or</div>
    <div class="link-row">New company? <a href="company-register.html">Register here</a></div>
    <div class="link-row" style="margin-top:6px;">Job seeker? <a href="login.html">User Login</a></div>
  </div>
</div>
<script>
  function togglePwd() {
    const inp=document.getElementById('password'), icon=document.getElementById('eyeIcon');
    if(inp.type==='password'){inp.type='text';icon.className='fas fa-eye-slash';}
    else{inp.type='password';icon.className='fas fa-eye';}
  }
  function showMsg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className=`msg ${type}`;m.style.display='block';}
  function doLogin(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!email||!password){showMsg('Please fill all fields.','error');return;}
    const btn=document.getElementById('loginBtn');
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Logging in...';
    fetch('http://localhost:8080/company/login',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})
    })
    .then(r=>r.json())
    .then(data=>{
      if(data.status==='success'){
        localStorage.setItem('company',JSON.stringify(data.company));
        showMsg('Login successful! Redirecting...','success');
        setTimeout(()=>{window.location.href='company-dashboard.html';},1000);
      } else { showMsg(data.message||'Invalid credentials.','error'); }
    })
    .catch(()=>showMsg('Cannot connect to server.','error'))
    .finally(()=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Login';});
  }
  document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
