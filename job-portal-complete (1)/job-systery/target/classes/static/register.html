<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Job Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);min-height:100vh;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px 0;}
    .container{width:100%;max-width:480px;padding:20px;}
    .brand{text-align:center;margin-bottom:28px;}
    .brand .icon{width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .brand .icon i{color:white;font-size:1.5rem;}
    .brand h1{color:#e2e8f0;font-size:1.5rem;font-weight:800;}
    .brand p{color:#64748b;font-size:0.88rem;margin-top:4px;}
    .card{background:rgba(30,41,59,0.85);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:36px;backdrop-filter:blur(10px);box-shadow:0 25px 60px rgba(0,0,0,0.4);}
    .section-title{color:#818cf8;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(99,102,241,0.15);}
    .section-title:first-child{margin-top:0;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .field{margin-bottom:14px;}
    label{color:#94a3b8;font-size:0.83rem;font-weight:600;display:block;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap i.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:0.88rem;}
    input,select,textarea{width:100%;background:rgba(15,23,42,0.7);border:1px solid rgba(99,102,241,0.2);color:#e2e8f0;border-radius:10px;padding:11px 14px 11px 40px;font-size:0.9rem;transition:all .2s;outline:none;font-family:'Segoe UI',sans-serif;}
    select,textarea{padding-left:14px;}
    input:focus,select:focus,textarea:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
    input::placeholder,textarea::placeholder{color:#334155;}
    select option{background:#1e293b;}
    textarea{resize:none;height:72px;}
    .strength-bar{height:4px;background:rgba(99,102,241,0.15);border-radius:2px;margin-top:6px;}
    .strength-fill{height:100%;border-radius:2px;transition:all .3s;width:0;}
    .strength-label{font-size:0.75rem;margin-top:4px;height:16px;}
    .btn-submit{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.4);}
    .btn-submit:disabled{opacity:.6;transform:none;cursor:not-allowed;}
    .msg{font-size:0.85rem;font-weight:600;text-align:center;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
    .msg.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;}
    .msg.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
    .link-row{text-align:center;color:#64748b;font-size:0.85rem;margin-top:16px;}
    .link-row a{color:#818cf8;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="icon"><i class="fas fa-user-plus"></i></div>
    <h1>Create Account</h1>
    <p>Start your job search journey</p>
  </div>
  <div class="card">
    <div class="section-title"><i class="fas fa-user" style="margin-right:6px;"></i>Personal Info</div>
    <div class="row">
      <div class="field">
        <label>Full Name *</label>
        <div class="input-wrap"><i class="icon fas fa-user"></i><input type="text" id="name" placeholder="John Doe"></div>
      </div>
      <div class="field">
        <label>Phone</label>
        <div class="input-wrap"><i class="icon fas fa-phone"></i><input type="tel" id="phone" placeholder="017XXXXXXXX"></div>
      </div>
    </div>
    <div class="field">
      <label>Email Address *</label>
      <div class="input-wrap"><i class="icon fas fa-envelope"></i><input type="email" id="email" placeholder="you@example.com"></div>
    </div>
    <div class="row">
      <div class="field">
        <label>Password *</label>
        <div class="input-wrap"><i class="icon fas fa-lock"></i><input type="password" id="password" placeholder="Min 6 characters" oninput="checkStrength(this.value)"></div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="field">
        <label>Confirm Password *</label>
        <div class="input-wrap"><i class="icon fas fa-lock"></i><input type="password" id="confirmPassword" placeholder="Repeat password"></div>
      </div>
    </div>

    <div class="section-title"><i class="fas fa-graduation-cap" style="margin-right:6px;"></i>Professional Info</div>
    <div class="row">
      <div class="field">
        <label>Education</label>
        <select id="education">
          <option value="">Select level</option>
          <option>SSC</option><option>HSC</option>
          <option>BSc</option><option>MSc</option><option>PhD</option>
        </select>
      </div>
      <div class="field">
        <label>Experience</label>
        <select id="experience">
          <option value="">Select range</option>
          <option>Fresh Graduate</option><option>0–1 year</option>
          <option>1–3 years</option><option>3–5 years</option><option>5+ years</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Skills</label>
      <textarea id="skills" placeholder="e.g. Java, React, Python, SQL..."></textarea>
    </div>

    <button class="btn-submit" id="regBtn" onclick="doRegister()">
      <i class="fas fa-user-plus" style="margin-right:8px;"></i>Create Account
    </button>
    <div class="msg" id="msg"></div>
    <div class="link-row">Already have an account? <a href="login.html">Login here</a></div>
    <div class="link-row" style="margin-top:6px;">Registering a company? <a href="company-register.html">Company Registration</a></div>
  </div>
</div>
<script>
  function checkStrength(v) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    if (!v) { fill.style.width='0'; label.textContent=''; return; }
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
    const labels = ['Weak','Fair','Good','Strong','Very Strong'];
    const widths = ['20%','40%','60%','80%','100%'];
    fill.style.width = widths[score-1]||'0';
    fill.style.background = colors[score-1]||'transparent';
    label.textContent = score ? labels[score-1] : '';
    label.style.color = colors[score-1]||'transparent';
  }
  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text; m.className = `msg ${type}`; m.style.display = 'block';
  }
  function doRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (!name || !email || !password || !confirm) { showMsg('Please fill all required fields.','error'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.','error'); return; }
    if (password !== confirm) { showMsg('Passwords do not match.','error'); return; }
    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Creating...';
    fetch('http://localhost:8080/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name, email, password, role:'USER',
        phone: document.getElementById('phone').value.trim(),
        education: document.getElementById('education').value,
        experience: document.getElementById('experience').value,
        skills: document.getElementById('skills').value.trim()
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.status === 'success') {
        showMsg('Account created! Redirecting to login...','success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      } else { showMsg(data.message || 'Registration failed.','error'); }
    })
    .catch(() => showMsg('Cannot connect to server.','error'))
    .finally(() => { btn.disabled=false; btn.innerHTML='<i class="fas fa-user-plus" style="margin-right:8px;"></i>Create Account'; });
  }
</script>
</body>
</html>
