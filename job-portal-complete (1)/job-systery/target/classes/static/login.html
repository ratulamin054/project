<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Job Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);min-height:100vh;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;}
    .container{width:100%;max-width:440px;padding:20px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand .icon{width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .brand .icon i{color:white;font-size:1.5rem;}
    .brand h1{color:#e2e8f0;font-size:1.6rem;font-weight:800;}
    .brand p{color:#64748b;font-size:0.88rem;margin-top:4px;}
    .card{background:rgba(30,41,59,0.85);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:36px;backdrop-filter:blur(10px);box-shadow:0 25px 60px rgba(0,0,0,0.4);}
    .tabs{display:flex;background:rgba(15,23,42,0.6);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
    .tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:0.88rem;font-weight:600;color:#64748b;transition:all .2s;border:none;background:transparent;}
    .tab.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;}
    label{color:#94a3b8;font-size:0.83rem;font-weight:600;display:block;margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:16px;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:0.9rem;}
    input{width:100%;background:rgba(15,23,42,0.7);border:1px solid rgba(99,102,241,0.2);color:#e2e8f0;border-radius:10px;padding:12px 14px 12px 40px;font-size:0.92rem;transition:all .2s;outline:none;}
    input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
    input::placeholder{color:#334155;}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:0.9rem;}
    .btn-submit{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.4);}
    .btn-submit:disabled{opacity:.6;transform:none;cursor:not-allowed;}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#334155;font-size:0.8rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(99,102,241,0.15);}
    .link-row{text-align:center;color:#64748b;font-size:0.85rem;margin-top:16px;}
    .link-row a{color:#818cf8;font-weight:600;text-decoration:none;}
    .link-row a:hover{color:#a5b4fc;}
    .msg{font-size:0.85rem;font-weight:600;text-align:center;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
    .msg.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;}
    .msg.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
    .demo-creds{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:12px 14px;margin-bottom:20px;}
    .demo-creds p{color:#64748b;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .demo-creds .cred{color:#94a3b8;font-size:0.82rem;margin-bottom:2px;}
    .demo-creds .cred span{color:#818cf8;font-weight:600;}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="icon"><i class="fas fa-briefcase"></i></div>
    <h1>Job Portal</h1>
    <p>Find your dream job today</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('user')">Job Seeker</button>
      <button class="tab" onclick="switchTab('admin')">Admin</button>
    </div>

    <div class="demo-creds" id="demoCreds">
      <p>Demo Credentials</p>
      <div class="cred">Email: <span>alice@example.com</span></div>
      <div class="cred">Password: <span>pass123</span></div>
    </div>

    <label>Email Address</label>
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <label>Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Your password">
      <button class="eye-btn" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Login
    </button>

    <div class="msg" id="msg"></div>

    <div class="divider">or</div>
    <div class="link-row">Don't have an account? <a href="register.html">Register here</a></div>
    <div class="link-row" style="margin-top:8px;">Company? <a href="company-login.html">Company Login</a></div>
  </div>
</div>
<script>
  let activeTab = 'user';
  function switchTab(t) {
    activeTab = t;
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (t==='user'&&i===0)||(t==='admin'&&i===1)));
    const demo = document.getElementById('demoCreds');
    if (t === 'admin') {
      demo.innerHTML = `<p>Demo Credentials</p><div class="cred">Email: <span>admin@jobportal.com</span></div><div class="cred">Password: <span>admin123</span></div>`;
    } else {
      demo.innerHTML = `<p>Demo Credentials</p><div class="cred">Email: <span>alice@example.com</span></div><div class="cred">Password: <span>pass123</span></div>`;
    }
  }
  function togglePwd() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') { inp.type='text'; icon.className='fas fa-eye-slash'; }
    else { inp.type='password'; icon.className='fas fa-eye'; }
  }
  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text; m.className = `msg ${type}`; m.style.display = 'block';
  }
  function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showMsg('Please fill all fields.', 'error'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Logging in...';
    fetch('http://localhost:8080/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    })
    .then(r => r.json())
    .then(data => {
      if (data.status === 'success') {
        const role = data.user.role;
        if (activeTab === 'admin' && role !== 'ADMIN') { showMsg('Access denied. Not an admin account.','error'); return; }
        if (activeTab === 'user' && role === 'ADMIN') { showMsg('Please use the Admin tab to login.','error'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showMsg('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = role === 'ADMIN' ? 'admin-dashboard.html' : 'dashboard.html'; }, 1000);
      } else { showMsg(data.message || 'Login failed.', 'error'); }
    })
    .catch(() => showMsg('Cannot connect to server. Make sure backend is running on port 8080.', 'error'))
    .finally(() => { btn.disabled=false; btn.innerHTML='<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Login'; });
  }
  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
