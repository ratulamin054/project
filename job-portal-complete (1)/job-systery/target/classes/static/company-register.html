<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Registration | Job Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(135deg,#0f172a 0%,#14193a 50%,#0f172a 100%);min-height:100vh;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px 0;}
    .container{width:100%;max-width:480px;padding:20px;}
    .brand{text-align:center;margin-bottom:28px;}
    .brand .icon{width:60px;height:60px;background:linear-gradient(135deg,#0ea5e9,#6366f1);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
    .brand .icon i{color:white;font-size:1.5rem;}
    .brand h1{color:#e2e8f0;font-size:1.5rem;font-weight:800;}
    .brand p{color:#64748b;font-size:.88rem;margin-top:4px;}
    .card{background:rgba(30,41,59,.85);border:1px solid rgba(14,165,233,.2);border-radius:20px;padding:36px;box-shadow:0 25px 60px rgba(0,0,0,.4);}
    .section-title{color:#38bdf8;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 14px;padding-bottom:8px;border-bottom:1px solid rgba(14,165,233,.15);}
    .section-title:first-child{margin-top:0;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .field{margin-bottom:14px;}
    label{color:#94a3b8;font-size:.83rem;font-weight:600;display:block;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap i.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;font-size:.88rem;}
    input,select,textarea{width:100%;background:rgba(15,23,42,.7);border:1px solid rgba(14,165,233,.2);color:#e2e8f0;border-radius:10px;padding:11px 14px 11px 40px;font-size:.9rem;outline:none;font-family:'Segoe UI',sans-serif;transition:all .2s;}
    select,textarea{padding-left:14px;}
    input:focus,select:focus,textarea:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(14,165,233,.15);}
    input::placeholder,textarea::placeholder{color:#334155;}
    select option{background:#1e293b;}
    textarea{resize:none;height:80px;}
    .btn-submit{width:100%;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(14,165,233,.4);}
    .btn-submit:disabled{opacity:.6;transform:none;cursor:not-allowed;}
    .msg{font-size:.85rem;font-weight:600;text-align:center;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;}
    .msg.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;}
    .msg.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
    .link-row{text-align:center;color:#64748b;font-size:.85rem;margin-top:14px;}
    .link-row a{color:#38bdf8;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="icon"><i class="fas fa-building"></i></div>
    <h1>Register Company</h1>
    <p>Post jobs and find top talent</p>
  </div>
  <div class="card">
    <div class="section-title"><i class="fas fa-building" style="margin-right:6px;"></i>Company Details</div>
    <div class="field">
      <label>Company Name *</label>
      <div class="input-wrap"><i class="icon fas fa-building"></i><input type="text" id="name" placeholder="Acme Corporation"></div>
    </div>
    <div class="row">
      <div class="field">
        <label>Industry</label>
        <select id="industry">
          <option value="">Select industry</option>
          <option>Technology</option><option>Finance</option><option>Healthcare</option>
          <option>Education</option><option>E-commerce</option><option>Manufacturing</option><option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Website</label>
        <div class="input-wrap"><i class="icon fas fa-globe"></i><input type="url" id="website" placeholder="https://yourcompany.com"></div>
      </div>
    </div>
    <div class="field">
      <label>Company Description</label>
      <textarea id="description" placeholder="Brief description of your company..."></textarea>
    </div>

    <div class="section-title"><i class="fas fa-key" style="margin-right:6px;"></i>Account Credentials</div>
    <div class="field">
      <label>Email Address *</label>
      <div class="input-wrap"><i class="icon fas fa-envelope"></i><input type="email" id="email" placeholder="hr@company.com"></div>
    </div>
    <div class="row">
      <div class="field">
        <label>Password *</label>
        <div class="input-wrap"><i class="icon fas fa-lock"></i><input type="password" id="password" placeholder="Min 6 characters"></div>
      </div>
      <div class="field">
        <label>Confirm Password *</label>
        <div class="input-wrap"><i class="icon fas fa-lock"></i><input type="password" id="confirmPassword" placeholder="Repeat password"></div>
      </div>
    </div>

    <button class="btn-submit" id="regBtn" onclick="doRegister()">
      <i class="fas fa-building" style="margin-right:8px;"></i>Register Company
    </button>
    <div class="msg" id="msg"></div>
    <div class="link-row">Already registered? <a href="company-login.html">Login here</a></div>
  </div>
</div>
<script>
  function showMsg(text,type){const m=document.getElementById('msg');m.textContent=text;m.className=`msg ${type}`;m.style.display='block';}
  function doRegister(){
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const confirm=document.getElementById('confirmPassword').value;
    if(!name||!email||!password||!confirm){showMsg('Please fill all required fields.','error');return;}
    if(password.length<6){showMsg('Password must be at least 6 characters.','error');return;}
    if(password!==confirm){showMsg('Passwords do not match.','error');return;}
    const btn=document.getElementById('regBtn');
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Registering...';
    fetch('http://localhost:8080/company/register',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,password,industry:document.getElementById('industry').value,website:document.getElementById('website').value.trim(),description:document.getElementById('description').value.trim(),role:'COMPANY'})
    })
    .then(r=>r.json())
    .then(data=>{
      if(data.status==='success'){
        showMsg('Company registered successfully! Redirecting...','success');
        setTimeout(()=>{window.location.href='company-login.html';},1500);
      } else { showMsg(data.message||'Registration failed.','error'); }
    })
    .catch(()=>showMsg('Cannot connect to server.','error'))
    .finally(()=>{btn.disabled=false;btn.innerHTML='<i class="fas fa-building" style="margin-right:8px;"></i>Register Company';});
  }
</script>
</body>
</html>
