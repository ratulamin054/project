<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Dashboard | Job Portal</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100vh;font-family:'Segoe UI',sans-serif;display:flex;}
    .sidebar{width:240px;min-height:100vh;background:rgba(15,23,42,.97);border-right:1px solid rgba(14,165,233,.2);padding:28px 18px;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;}
    .sidebar .brand{color:#38bdf8;font-size:1.3rem;font-weight:800;margin-bottom:36px;display:flex;align-items:center;gap:10px;}
    .sidebar a{display:flex;align-items:center;gap:10px;padding:11px 14px;color:#94a3b8;text-decoration:none;border-radius:10px;font-size:.9rem;font-weight:500;margin-bottom:4px;transition:all .2s;}
    .sidebar a:hover,.sidebar a.active{background:rgba(14,165,233,.15);color:#e2e8f0;}
    .sidebar a i{width:18px;}
    .sidebar .logout-btn{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(239,68,68,.15);color:#f87171;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;width:100%;transition:all .2s;}
    .sidebar .logout-btn:hover{background:rgba(239,68,68,.3);}
    .main{margin-left:240px;padding:32px;flex:1;}
    .topbar{display:flex;justify-content:space-between;align-items:center;background:rgba(30,41,59,.8);border:1px solid rgba(14,165,233,.15);border-radius:14px;padding:18px 24px;margin-bottom:28px;}
    .topbar h4{color:#e2e8f0;font-weight:800;margin:0;}
    .company-chip{display:flex;align-items:center;gap:8px;background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.3);border-radius:20px;padding:6px 14px;color:#7dd3fc;font-size:.85rem;}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:28px;}
    .stat-card{background:rgba(30,41,59,.8);border:1px solid rgba(14,165,233,.12);border-radius:16px;padding:22px;display:flex;align-items:center;gap:16px;}
    .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
    .stat-icon.blue{background:rgba(14,165,233,.2);color:#38bdf8;}
    .stat-icon.green{background:rgba(34,197,94,.2);color:#4ade80;}
    .stat-icon.orange{background:rgba(251,146,60,.2);color:#fb923c;}
    .stat-num{color:#e2e8f0;font-size:1.8rem;font-weight:800;line-height:1;}
    .stat-label{color:#64748b;font-size:.8rem;margin-top:4px;}
    .panel{background:rgba(30,41,59,.8);border:1px solid rgba(14,165,233,.12);border-radius:16px;padding:24px;margin-bottom:24px;}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .section-header h5{color:#e2e8f0;font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px;}
    table{width:100%;border-collapse:collapse;}
    th{color:#475569;font-size:.77rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;text-align:left;border-bottom:1px solid rgba(14,165,233,.1);}
    td{color:#94a3b8;font-size:.87rem;padding:13px 14px;border-bottom:1px solid rgba(15,23,42,.4);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(14,165,233,.03);}
    .empty-row td{text-align:center;color:#475569;padding:32px;}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.76rem;font-weight:700;}
    .badge-ACTIVE{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
    .badge-CLOSED{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3);}
    .badge-PENDING{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.3);}
    .badge-ACCEPTED{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
    .badge-REJECTED{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}
    .btn-sm{padding:6px 13px;border-radius:7px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;margin-right:4px;}
    .btn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;}
    .btn-success{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
    .btn-danger{background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3);}
    .btn-warning{background:rgba(251,146,60,.2);color:#fb923c;border:1px solid rgba(251,146,60,.3);}
    .btn-lg{width:100%;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
    .btn-lg:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(14,165,233,.35);}
    .job-desc-preview{color:#64748b;font-size:.8rem;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .toast{position:fixed;bottom:28px;right:28px;z-index:9999;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:#4ade80;padding:13px 20px;border-radius:12px;font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:10px;transform:translateY(80px);transition:transform .3s;box-shadow:0 8px 25px rgba(0,0,0,.3);}
    .toast.show{transform:translateY(0);}
    .toast.error{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:#f87171;}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="brand"><i class="fas fa-building"></i>Company</div>
  <a href="company-dashboard.html" class="active"><i class="fas fa-chart-pie"></i>Dashboard</a>
  <a href="Job-Post.html"><i class="fas fa-plus-circle"></i>Post a Job</a>
  <a href="#jobs" onclick="showSection('jobs')"><i class="fas fa-list"></i>My Jobs</a>
  <a href="#applications" onclick="showSection('apps')"><i class="fas fa-users"></i>Applications</a>
  <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
</div>
<div class="main">
  <div class="topbar">
    <h4><i class="fas fa-chart-pie" style="color:#38bdf8;margin-right:10px;"></i>Company Dashboard</h4>
    <div class="company-chip"><i class="fas fa-building"></i><span id="cName">Loading...</span></div>
  </div>

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-briefcase"></i></div><div><div class="stat-num" id="statJobs">0</div><div class="stat-label">Total Jobs Posted</div></div></div>
    <div class="stat-card"><div class="stat-icon green"><i class="fas fa-users"></i></div><div><div class="stat-num" id="statApps">0</div><div class="stat-label">Total Applications</div></div></div>
    <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-check-circle"></i></div><div><div class="stat-num" id="statActive">0</div><div class="stat-label">Active Jobs</div></div></div>
  </div>

  <!-- POST JOB CTA -->
  <div class="panel" style="padding:20px;">
    <a href="Job-Post.html" class="btn-lg"><i class="fas fa-plus-circle"></i>Post a New Job</a>
  </div>

  <!-- JOBS TABLE -->
  <div class="panel" id="jobs">
    <div class="section-header">
      <h5><i class="fas fa-briefcase" style="color:#38bdf8;"></i>My Posted Jobs</h5>
    </div>
    <table>
      <thead><tr><th>#</th><th>Title</th><th>Type</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="jobTable"></tbody>
    </table>
  </div>

  <!-- APPLICATIONS TABLE -->
  <div class="panel" id="apps">
    <div class="section-header">
      <h5><i class="fas fa-users" style="color:#38bdf8;"></i>Received Applications</h5>
    </div>
    <table>
      <thead><tr><th>#</th><th>Applicant</th><th>Email</th><th>Job</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="appTable"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const company = JSON.parse(localStorage.getItem('company'));
  if (!company) window.location.href = 'company-login.html';
  document.getElementById('cName').textContent = company.name;

  function loadData() {
    fetch('http://localhost:8080/jobs/company/' + encodeURIComponent(company.name))
      .then(r => r.json())
      .then(jobs => {
        document.getElementById('statJobs').textContent = jobs.length;
        document.getElementById('statActive').textContent = jobs.filter(j=>j.status==='ACTIVE').length;
        document.getElementById('jobTable').innerHTML = jobs.length ? jobs.map((j,i) => `
          <tr>
            <td>${i+1}</td>
            <td><strong style="color:#e2e8f0;">${j.title}</strong><div class="job-desc-preview">${j.description||''}</div></td>
            <td>${j.type||'-'}</td>
            <td>${j.location||'-'}</td>
            <td><span class="badge badge-${j.status}">${j.status}</span></td>
            <td>
              ${j.status==='ACTIVE'
                ? `<button class="btn-sm btn-warning" onclick="toggleJob(${j.id},'CLOSED')">Close</button>`
                : `<button class="btn-sm btn-success" onclick="toggleJob(${j.id},'ACTIVE')">Reopen</button>`}
              <button class="btn-sm btn-danger" onclick="deleteJob(${j.id})">Delete</button>
            </td>
          </tr>`).join('')
          : '<tr class="empty-row"><td colspan="6"><i class="fas fa-briefcase" style="font-size:1.5rem;display:block;margin-bottom:8px;"></i>No jobs posted yet.</td></tr>';
      });

    fetch('http://localhost:8080/application/all')
      .then(r => r.json())
      .then(apps => {
        const mine = apps.filter(a => a.companyName === company.name);
        document.getElementById('statApps').textContent = mine.length;
        document.getElementById('appTable').innerHTML = mine.length ? mine.map((a,i) => `
          <tr>
            <td>${i+1}</td>
            <td style="color:#e2e8f0;font-weight:600;">${a.userName}</td>
            <td>${a.userEmail}</td>
            <td>${a.jobTitle}</td>
            <td><span class="badge badge-${a.status}">${a.status}</span></td>
            <td>
              ${a.status==='PENDING' ? `
                <button class="btn-sm btn-success" onclick="updateApp(${a.id},'accept')"><i class="fas fa-check"></i> Accept</button>
                <button class="btn-sm btn-danger" onclick="updateApp(${a.id},'reject')"><i class="fas fa-times"></i> Reject</button>
              ` : `<span style="color:#475569;font-size:.78rem;">${a.status}</span>`}
            </td>
          </tr>`).join('')
          : '<tr class="empty-row"><td colspan="6"><i class="fas fa-users" style="font-size:1.5rem;display:block;margin-bottom:8px;"></i>No applications yet.</td></tr>';
      });
  }

  function toggleJob(id, status) {
    fetch(`http://localhost:8080/jobs/${id}/status?status=${status}`, {method:'PUT'})
      .then(() => { showToast(`Job ${status==='CLOSED'?'closed':'reopened'}.`); loadData(); });
  }
  function deleteJob(id) {
    if (!confirm('Delete this job and all its applications?')) return;
    fetch(`http://localhost:8080/jobs/${id}`, {method:'DELETE'})
      .then(() => { showToast('Job deleted.'); loadData(); });
  }
  function updateApp(id, action) {
    fetch(`http://localhost:8080/application/${action}/${id}`, {method:'PUT'})
      .then(() => { showToast(`Application ${action==='accept'?'accepted':'rejected'}.`); loadData(); });
  }
  function showSection(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); }
  function showToast(msg,type='success') {
    const t=document.getElementById('toast');
    t.textContent=msg;t.className=`toast${type==='error'?' error':''}`;
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
  }
  function logout(){localStorage.removeItem('company');window.location.href='company-login.html';}
  loadData();
</script>
</body>
</html>
